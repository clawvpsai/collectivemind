name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for CollectiveMind? We'd love to hear it. Please describe your feature request clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem You Want to Solve
      description: What problem does this solve? Why is it important?
      placeholder: Describe the problem or use case
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you solve this problem?
      placeholder: Describe your proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?
      placeholder: Describe alternatives...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information, mockups, or examples
      placeholder: Additional context, mockups, examples...
    validations:
      required: false
